name: Store data correction
description: Suggest a correction to a store record
title: "[Data] "
labels:
  - data
body:
  - type: input
    id: store
    attributes:
      label: Store
      description: Store name or id
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Correction
      description: What should change?
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Source URL
      description: Link to a source that supports the correction
    validations:
      required: true
  - type: checkboxes
    id: license
    attributes:
      label: License confirmation
      options:
        - label: I am not copying data from other proprietary apps or another proprietary app.
          required: true
