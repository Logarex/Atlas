name: Validate data

on:
  pull_request:
    paths:
      - "packages/data/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/validate-data.yml"
  push:
    branches:
      - main

jobs:
  validate-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - run: npm run data:validate
